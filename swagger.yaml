openapi: 3.0.3
info:
    title: GitHub Release Notification API
    version: 1.0.0
    description: API for subscribing to email notifications about new GitHub repository releases.

servers:
    - url: http://localhost:3000

tags:
    - name: Subscriptions
      description: Manage GitHub release subscriptions

paths:
    /api/subscribe:
        post:
            tags:
                - Subscriptions
            summary: Subscribe an email to release notifications
            description: Creates a new subscription for a GitHub repository and sends a confirmation email.
            operationId: subscribeToRepository
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SubscribeRequest"
            responses:
                "201":
                    description: Subscription created successfully. Confirmation email sent.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/SubscribeResponse"
                "400":
                    description: Invalid request body or invalid repository format.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: GitHub repository not found.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "409":
                    description: Subscription already exists.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "429":
                    description: GitHub API rate limit exceeded.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "500":
                    description: Internal server error.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"

    /api/confirm/{token}:
        get:
            tags:
                - Subscriptions
            summary: Confirm email subscription
            description: Confirms a pending subscription using the confirmation token from email.
            operationId: confirmSubscription
            parameters:
                - name: token
                  in: path
                  required: true
                  description: Confirmation token
                  schema:
                      type: string
            responses:
                "200":
                    description: Subscription confirmed successfully.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/MessageResponse"
                "400":
                    description: Invalid token.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Token not found.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "410":
                    description: Token already used or subscription already confirmed.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "500":
                    description: Internal server error.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"

    /api/unsubscribe/{token}:
        get:
            tags:
                - Subscriptions
            summary: Unsubscribe from release notifications
            description: Deactivates an existing subscription using the unsubscribe token.
            operationId: unsubscribeSubscription
            parameters:
                - name: token
                  in: path
                  required: true
                  description: Unsubscribe token
                  schema:
                      type: string
            responses:
                "200":
                    description: Unsubscribed successfully.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/MessageResponse"
                "400":
                    description: Invalid token.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: Token not found.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "410":
                    description: Subscription already unsubscribed.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "500":
                    description: Internal server error.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"

    /api/subscriptions:
        get:
            tags:
                - Subscriptions
            summary: Get all active subscriptions for an email
            description: Returns all active repository subscriptions associated with the given email.
            operationId: getSubscriptionsByEmail
            parameters:
                - name: email
                  in: query
                  required: true
                  description: Subscriber email
                  schema:
                      type: string
                      format: email
            responses:
                "200":
                    description: Active subscriptions retrieved successfully.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/SubscriptionsResponse"
                "400":
                    description: Invalid email query parameter.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    description: No subscriptions found for this email.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "500":
                    description: Internal server error.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"

components:
    schemas:
        SubscribeRequest:
            type: object
            additionalProperties: false
            required:
                - email
                - repository
            properties:
                email:
                    type: string
                    format: email
                    example: user@example.com
                repository:
                    type: string
                    description: GitHub repository in owner/repo format
                    example: golang/go

        SubscribeResponse:
            type: object
            additionalProperties: false
            required:
                - message
                - email
                - repository
            properties:
                message:
                    type: string
                    example: Confirmation email sent. Please confirm your subscription.
                email:
                    type: string
                    format: email
                    example: user@example.com
                repository:
                    type: string
                    example: golang/go

        MessageResponse:
            type: object
            additionalProperties: false
            required:
                - message
            properties:
                message:
                    type: string
                    example: Operation completed successfully.

        SubscriptionItem:
            type: object
            additionalProperties: false
            required:
                - repository
                - status
                - createdAt
            properties:
                repository:
                    type: string
                    example: golang/go
                status:
                    type: string
                    enum:
                        - active
                createdAt:
                    type: string
                    format: date-time
                    example: 2026-04-08T10:30:00Z

        SubscriptionsResponse:
            type: object
            additionalProperties: false
            required:
                - email
                - subscriptions
            properties:
                email:
                    type: string
                    format: email
                    example: user@example.com
                subscriptions:
                    type: array
                    items:
                        $ref: "#/components/schemas/SubscriptionItem"

        ErrorResponse:
            type: object
            additionalProperties: false
            required:
                - error
                - message
            properties:
                error:
                    type: string
                    example: Bad Request
                message:
                    type: string
                    example: Repository format must be owner/repo.
