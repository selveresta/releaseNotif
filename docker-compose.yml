services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: release_notif
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d release_notif"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8025/api/v1/messages >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/release_notif
      API_KEY: dev-api-key
      GITHUB_API_BASE_URL: https://api.github.com
      SCANNER_CRON: "*/1 * * * *"
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: notifications@localhost
      APP_BASE_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      GRPC_PORT: 50051
      ENABLE_GRPC: "true"
      ENABLE_METRICS: "true"
      LOG_LEVEL: info
    ports:
      - "3000:3000"
      - "50051:50051"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
